version: 2
updates:
  # Cargo dependencies (this crate has none today, but future ones + the lockfile).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    ignore:
      # The msrv job pins dtolnay/rust-toolchain to the crate's declared MSRV on
      # purpose; raise it only when bumping rust-version, never automatically.
      - dependency-name: "dtolnay/rust-toolchain"
